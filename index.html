<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>크레스티드게코 모프 메모리</title>
<style>
  /* ============================================================
     GDD-001 크레스티드게코 모프 메모리
     디자인 컨셉 : 은하수 / 오로라 / 별빛 / 신비로운 숲, 프리미엄 톤
     ============================================================ */

  :root{
    --bg-navy-1:#050014;
    --bg-navy-2:#0b0b33;
    --bg-navy-3:#161049;
    --accent-gold:#ffd24c;
    --accent-lavender:#b98bff;
    --accent-aurora:#57e6c1;
    --text-light:#f5f0ff;
    --text-dim:#b9b3d6;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.14);

    /* 희귀도 컬러 (카드 프레임 Glow 색상) */
    --c-common:#b9c2cc;
    --c-rare:#4fa8ff;
    --c-superrare:#b36bff;
    --c-epic:#ff5fd1;
    --c-legend:#ffd24c;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(ellipse at 50% -10%, var(--bg-navy-3) 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-navy-1) 0%, var(--bg-navy-2) 55%, var(--bg-navy-1) 100%);
    color:var(--text-light);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    overflow:hidden;
    overscroll-behavior:none;
    user-select:none;
    -webkit-user-select:none;
  }

  /* ---------- 배경 별 파티클 ---------- */
  #stars{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .star{
    position:absolute; border-radius:50%; background:#fff;
    box-shadow:0 0 6px 1px rgba(255,255,255,0.8);
    animation:twinkle 3.2s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:.25; transform:scale(.8); }
    50%{ opacity:1; transform:scale(1.15); }
  }

  /* ---------- 세로모드 강제 ---------- */
  #rotate-overlay{
    display:none; position:fixed; inset:0; z-index:999;
    background:var(--bg-navy-1); color:var(--text-light);
    align-items:center; justify-content:center; text-align:center;
    flex-direction:column; gap:12px; padding:24px;
  }
  @media (orientation:landscape) and (max-height:600px){
    #rotate-overlay{ display:flex; }
  }

  /* ---------- 공통 레이아웃 ---------- */
  #app{ position:relative; z-index:1; height:100%; width:100%; max-width:520px; margin:0 auto; }
  .screen{
    display:none; flex-direction:column; align-items:center; justify-content:center;
    height:100%; width:100%; padding:24px 20px; text-align:center;
  }
  .screen.active{ display:flex; }

  .title{
    font-size:22px; font-weight:700; letter-spacing:1px;
    background:linear-gradient(90deg, var(--accent-gold), var(--accent-lavender), var(--accent-aurora));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 6px 0;
  }
  .subtitle{ font-size:13px; color:var(--text-dim); margin:0 0 24px 0; line-height:1.6; }

  .btn{
    appearance:none; border:1px solid var(--glass-border); background:var(--glass);
    color:var(--text-light); padding:14px 22px; border-radius:16px; font-size:15px;
    font-weight:600; backdrop-filter:blur(6px); min-width:220px; cursor:pointer;
    transition:transform .15s ease, background .2s ease;
  }
  .btn:active{ transform:scale(.96); background:rgba(255,255,255,0.14); }
  .btn.primary{
    background:linear-gradient(135deg, var(--accent-lavender), var(--accent-aurora));
    color:#0b0b2e; border:none;
  }
  .btn.gold{
    background:linear-gradient(135deg, var(--accent-gold), #ff9f6b);
    color:#2a1500; border:none;
  }
  .btn-row{ display:flex; flex-direction:column; gap:12px; margin-top:22px; width:100%; align-items:center; }

  /* ---------- START 화면 ---------- */
  #screen-start .logo-glow{
    width:150px; height:150px; border-radius:50%; margin-bottom:22px;
    background:radial-gradient(circle, rgba(185,139,255,.35), transparent 70%);
    display:flex; align-items:center; justify-content:center;
    animation:pulseGlow 2.6s ease-in-out infinite;
  }
  @keyframes pulseGlow{ 0%,100%{ transform:scale(1); opacity:.8;} 50%{ transform:scale(1.08); opacity:1;} }
  #screen-start img.gecko-icon{ width:88px; height:88px; object-fit:contain; filter:drop-shadow(0 0 18px rgba(185,139,255,.6)); }
  .touch-hint{
    margin-top:36px; font-size:14px; color:var(--text-light);
    letter-spacing:2px; animation:blinkHint 1.6s ease-in-out infinite;
  }
  @keyframes blinkHint{ 0%,100%{opacity:.3;} 50%{opacity:1;} }
  .link-small{
    margin-top:26px; font-size:12px; color:var(--text-dim); text-decoration:underline;
    background:none; border:none; cursor:pointer;
  }

  /* ---------- 게임(HUD + 보드) ---------- */
  #screen-game{ justify-content:flex-start; padding-top:18px; }
  #hud{
    width:100%; display:flex; align-items:center; justify-content:space-between;
    padding:8px 4px 14px 4px; border-bottom:1px solid var(--glass-border); margin-bottom:14px;
  }
  #hud .hud-title{ font-size:14px; font-weight:700; color:var(--text-light); }
  #hud .hud-stats{ display:flex; gap:14px; font-size:12px; color:var(--text-dim); }
  #hud .hud-stats b{ color:var(--accent-gold); font-size:13px; }

  .board{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:8px;
    width:100%; flex:1; align-content:center;
  }
  .card{
    aspect-ratio:3/4; cursor:pointer;
    perspective:800px; -webkit-perspective:800px;
    opacity:0; transform:translateY(24px) scale(.85);
    transition:opacity .4s ease, transform .4s ease;
    /* 그림자는 여기(.card)에 적용한다. .card-inner에 filter를 걸면
       transform-style:preserve-3d가 스펙상 강제로 flat 처리되어
       카드 뒤집기 3D 회전이 아예 동작하지 않는 버그가 있었다(핵심 원인). */
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
  }
  .card.dealt{ opacity:1; transform:translateY(0) scale(1); }
  .card-inner{
    position:relative; width:100%; height:100%;
    transition:transform .45s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d; -webkit-transform-style:preserve-3d;
  }
  /* 카드 뒤집기: Safari/iOS는 -webkit- 접두사가 없으면
     backface-visibility가 무시되어 앞면이 절대 보이지 않는 문제가 있다.
     반드시 -webkit- 접두사를 함께 지정해야 한다. */
  .card.flipped .card-inner{
    transform:rotateY(180deg); -webkit-transform:rotateY(180deg);
  }
  .card-face{
    position:absolute; inset:0; border-radius:10px;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    overflow:hidden; border:1px solid var(--glass-border); background:#0d0a2a;
  }
  .card-face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-front{
    transform:rotateY(180deg); -webkit-transform:rotateY(180deg);
  }
  .card.matched .card-inner{ animation:matchPulse .5s ease; }
  .card.matched .card-front{ box-shadow:0 0 16px 4px var(--accent-gold) inset, 0 0 18px 2px var(--accent-gold); }
  @keyframes matchPulse{
    0%{ transform:rotateY(180deg) scale(1); }
    40%{ transform:rotateY(180deg) scale(1.12); }
    100%{ transform:rotateY(180deg) scale(1); }
  }

  /* 스파클 파티클(매칭/축하 공용) */
  .spark{
    position:fixed; width:6px; height:6px; border-radius:50%; background:var(--accent-gold);
    box-shadow:0 0 8px 2px var(--accent-gold); pointer-events:none; z-index:50;
    animation:sparkFly .8s ease-out forwards;
  }
  @keyframes sparkFly{
    0%{ transform:translate(0,0) scale(1); opacity:1; }
    100%{ transform:translate(var(--dx), var(--dy)) scale(.2); opacity:0; }
  }

  /* ---------- 클리어(은하수) 연출 ---------- */
  #screen-clear{ position:relative; }
  .galaxy-ring{
    position:absolute; width:340px; height:340px; border-radius:50%;
    background:conic-gradient(from 0deg, var(--accent-lavender), var(--accent-aurora), var(--accent-gold), var(--accent-lavender));
    filter:blur(40px); opacity:.55; animation:spinGalaxy 6s linear infinite;
  }
  @keyframes spinGalaxy{ to{ transform:rotate(360deg); } }
  #screen-clear .title{ font-size:26px; position:relative; z-index:2; }
  #screen-clear .subtitle{ position:relative; z-index:2; }

  /* ---------- 카드팩 ---------- */
  #screen-pack .pack-wrap{
    width:180px; height:240px; position:relative; perspective:900px; cursor:pointer;
  }
  .pack-glow{
    position:absolute; inset:-30px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,210,76,.45), transparent 70%);
    animation:pulseGlow 2s ease-in-out infinite;
  }
  .pack-card{
    position:relative; width:100%; height:100%; border-radius:14px; overflow:hidden;
    border:1px solid var(--glass-border); box-shadow:0 10px 30px rgba(0,0,0,.5);
    animation:floatPack 3s ease-in-out infinite;
  }
  .pack-card img{ width:100%; height:100%; object-fit:cover; }
  @keyframes floatPack{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-10px);} }
  .pack-burst{
    position:absolute; inset:-60px; border-radius:50%; background:radial-gradient(circle, #fff, transparent 60%);
    opacity:0; pointer-events:none;
  }
  .pack-burst.active{ animation:burst .6s ease-out; }
  @keyframes burst{ 0%{ opacity:.9; transform:scale(.2);} 100%{ opacity:0; transform:scale(2.2);} }

  /* ---------- 카드 리빌 ---------- */
  #screen-reveal .reveal-card{
    width:200px; height:266px; border-radius:16px; overflow:hidden; position:relative;
    box-shadow:0 14px 34px rgba(0,0,0,.55); margin-bottom:14px;
    animation:revealIn .55s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes revealIn{
    0%{ transform:rotateY(180deg) scale(.7); -webkit-transform:rotateY(180deg) scale(.7); opacity:0;}
    100%{ transform:rotateY(0) scale(1); -webkit-transform:rotateY(0) scale(1); opacity:1;}
  }
  #screen-reveal .reveal-card img{ width:100%; height:100%; object-fit:cover; }
  .rarity-tag{
    display:inline-block; font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px;
    margin-bottom:6px; letter-spacing:1px;
  }
  .new-dup-tag{ font-size:20px; font-weight:800; letter-spacing:2px; margin:4px 0 2px 0; }
  .new-dup-tag.is-new{ color:var(--accent-gold); text-shadow:0 0 14px rgba(255,210,76,.7); }
  .new-dup-tag.is-dup{ color:var(--text-dim); }

  /* ---------- 컬렉션 ---------- */
  #screen-collection{ justify-content:flex-start; padding-top:18px; }
  .collection-head{ width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .collection-progress{ font-size:13px; color:var(--accent-gold); font-weight:700; }
  .collection-grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:10px; width:100%; overflow-y:auto; padding-bottom:16px;
  }
  .coll-item{
    aspect-ratio:3/4; border-radius:12px; overflow:hidden; position:relative;
    border:1px solid var(--glass-border); background:#0d0a2a; cursor:pointer;
  }
  .coll-item img{ width:100%; height:100%; object-fit:cover; display:block; }
  .coll-item.locked img{ filter:brightness(0) saturate(0); opacity:.35; }
  .coll-item .coll-badge{
    position:absolute; bottom:4px; right:4px; font-size:9px; font-weight:700;
    background:rgba(0,0,0,.55); padding:2px 6px; border-radius:8px;
  }
  .coll-item .coll-count{
    position:absolute; top:4px; right:4px; font-size:10px; font-weight:700;
    background:rgba(0,0,0,.6); padding:1px 6px; border-radius:8px; color:var(--accent-gold);
  }

  /* ---------- 모달(카드 확대) ---------- */
  #modal-card{
    display:none; position:fixed; inset:0; z-index:200; background:rgba(3,2,16,.86);
    align-items:center; justify-content:center; flex-direction:column; gap:16px;
  }
  #modal-card.active{ display:flex; }
  #modal-card .modal-img-wrap{
    position:relative; width:230px; height:306px; border-radius:16px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,.6);
  }
  #modal-card img{ width:100%; height:100%; object-fit:cover; }

  /* ---------- 이미지 로드 실패 시 대체 화면 ----------
     GitHub Pages 배포가 아직 안 됐거나 URL이 일시적으로 막힌 경우에도
     깨진 이미지 아이콘 대신 카드 이름이 보이도록 하는 안전장치 */
  .img-fallback{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:10px; font-size:12px; font-weight:700; line-height:1.4;
    color:var(--text-light);
    background:linear-gradient(135deg, rgba(185,139,255,.35), rgba(87,230,193,.25));
  }

  /* ---------- 토스트 ---------- */
  #toast{
    position:fixed; left:50%; bottom:34px; transform:translateX(-50%) translateY(20px);
    background:rgba(20,16,50,.92); border:1px solid var(--glass-border); color:var(--text-light);
    padding:10px 18px; border-radius:999px; font-size:13px; z-index:300; opacity:0; pointer-events:none;
    transition:opacity .25s ease, transform .25s ease; max-width:80%; text-align:center;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .back-btn{
    position:absolute; top:14px; left:14px; background:none; border:none; color:var(--text-dim);
    font-size:13px; z-index:5;
  }
</style>
</head>
<body>

<!-- 배경 별 파티클 컨테이너 (JS에서 동적 생성) -->
<div id="stars"></div>

<!-- 가로모드 차단 오버레이 -->
<div id="rotate-overlay">
  <div style="font-size:40px;">📱</div>
  <div>세로 모드로 즐겨주세요</div>
</div>

<div id="app">

  <!-- 1) 시작 화면 -->
  <section id="screen-start" class="screen active">
    <div class="logo-glow">
      <img class="gecko-icon" src="morphs/10-aurora-gecko.png" alt="크레스티드게코" onerror="this.style.display='none'; this.parentElement.innerHTML+='&#x2728;'">
    </div>
    <h1 class="title">크레스티드게코<br>모프 메모리</h1>
    <p class="subtitle">은하수 아래, 열 가지 모프를 기억하고<br>나만의 컬렉션을 완성해보세요.</p>
    <div class="touch-hint">TOUCH TO START</div>
    <button class="link-small" id="btn-goto-collection">내 컬렉션 보기</button>
  </section>

  <!-- 2) 게임(메모리 매칭) 화면 -->
  <section id="screen-game" class="screen">
    <div id="hud">
      <div class="hud-title">모프 메모리</div>
      <div class="hud-stats">
        <span>시도 <b id="stat-attempts">0</b></span>
        <span>맞춘 카드 <b id="stat-matched">0</b>/10</span>
      </div>
    </div>
    <div class="board" id="board"></div>
  </section>

  <!-- 3) 클리어(은하수 축하) 화면 -->
  <section id="screen-clear" class="screen">
    <div class="galaxy-ring"></div>
    <h2 class="title">CLEAR!</h2>
    <p class="subtitle">모든 모프를 기억해냈어요.<br>은하수가 축하를 보내고 있어요 ✦</p>
  </section>

  <!-- 4) 카드팩 화면 -->
  <section id="screen-pack" class="screen">
    <h2 class="title" style="font-size:18px;">카드팩이 도착했어요</h2>
    <p class="subtitle">터치해서 랜덤 카드를 확인하세요</p>
    <div class="pack-wrap" id="pack-wrap">
      <div class="pack-glow"></div>
      <div class="pack-burst" id="pack-burst"></div>
      <div class="pack-card">
        <img src="morphs/card-back.png" alt="카드팩" onerror="imgFallback(this)">
      </div>
    </div>
  </section>

  <!-- 5) 카드 리빌 화면 -->
  <section id="screen-reveal" class="screen">
    <div class="rarity-tag" id="reveal-rarity">RARE</div>
    <div class="reveal-card">
      <img id="reveal-img" alt="획득 카드" onerror="imgFallback(this)">
    </div>
    <div class="new-dup-tag" id="reveal-tag">NEW</div>
    <div class="subtitle" id="reveal-name" style="margin:2px 0 0 0;">-</div>
    <div class="btn-row">
      <button class="btn gold" id="btn-save-card">카드 저장하기</button>
      <button class="btn" id="btn-view-collection">컬렉션 보기</button>
      <button class="btn primary" id="btn-retry">다시하기</button>
    </div>
  </section>

  <!-- 6) 컬렉션 화면 -->
  <section id="screen-collection" class="screen">
    <button class="back-btn" id="btn-collection-back">← 뒤로</button>
    <div class="collection-head">
      <div class="title" style="font-size:16px; margin:0;">나의 컬렉션</div>
      <div class="collection-progress" id="collection-progress">0/10</div>
    </div>
    <div class="collection-grid" id="collection-grid"></div>
  </section>

</div>

<!-- 카드 확대 모달 -->
<div id="modal-card">
  <div class="modal-img-wrap"><img id="modal-img" alt="확대 카드" onerror="imgFallback(this)"></div>
  <div class="new-dup-tag" id="modal-name" style="font-size:15px;">-</div>
  <div class="btn-row" style="margin-top:4px;">
    <button class="btn gold" id="modal-save">PNG로 저장</button>
    <button class="btn" id="modal-close">닫기</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ==============================================================
   크레스티드게코 모프 메모리 - 게임 로직
   - 순수 HTML/CSS/JavaScript, 외부 라이브러리 없음
   - 데이터 저장은 LocalStorage만 사용 (서버/DB 없음)
   - 카드 정보는 배열로 관리 -> 추후 카드 추가 시 CARD_TYPES 배열만 수정하면 됨
   ============================================================== */

/* ---------- 1. 카드 데이터 (이미지 URL은 명세서 그대로 사용, 오타 포함) ---------- */
// 상대경로 사용: 이 HTML 파일이 저장소 루트(예: index.html)에 위치한다고 가정.
// 절대경로(https://.../morphs/...)나 루트 기준 절대경로(/morphs/...) 대신
// "morphs/파일명" 형태의 상대경로를 사용해 어떤 배포 주소에서도 안전하게 동작하도록 한다.
const IMG_BASE = "morphs/";
const CARD_BACK_URL = IMG_BASE + "card-back.png";

// 희귀도 등급 정의 (등장 확률 %, 카드 프레임 색상)
const RARITY = {
  common:    { label: "COMMON",     color: "var(--c-common)"   },
  rare:      { label: "RARE",       color: "var(--c-rare)"     },
  superrare: { label: "SUPER RARE", color: "var(--c-superrare)"},
  epic:      { label: "EPIC",       color: "var(--c-epic)"     },
  legend:    { label: "LEGEND",     color: "var(--c-legend)"   },
};

// 카드팩 등장 확률 (명세서 8. 희귀도 확률 그대로)
const RARITY_WEIGHTS = [
  { id: "common",    weight: 40 },
  { id: "rare",      weight: 28 },
  { id: "superrare", weight: 17 },
  { id: "epic",      weight: 10 },
  { id: "legend",    weight: 5  },
];

// 10종 모프 카드 (파일명은 명세서 원본 그대로 사용)
// ※ 등급 배정은 명세서에 별도 지정이 없어 임의로 설계한 값입니다.
//    실제 희귀 모프 기준에 맞게 언제든 rarity 값만 바꾸면 됩니다.
const CARD_TYPES = [
  { id:"01-pattenrnless",       name:"패턴리스",        rarity:"common",    file:"01-pattenrnless.png" },
  { id:"02-flame",              name:"플레임",          rarity:"common",    file:"02-flame.png" },

/* ---------- 2. LocalStorage 저장/불러오기 ---------- */
const STORAGE_KEY = "creMorphMemory_collection_v1";

function loadCollection(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveCollection(collection){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(collection)); }catch(e){ /* 저장 실패 시 무시 */ }
}
let collection = loadCollection(); // { cardId: { count: number } }

/* ---------- 3. 화면 전환 유틸 ---------- */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toast(msg, ms=2200){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(()=> t.classList.remove("show"), ms);
}

/* ---------- 3-1. 이미지 로드 실패 폴백 ----------
   GitHub Pages 배포 지연/실패 등으로 이미지가 404가 나도
   게임 흐름이 깨지지 않도록 카드 이름 텍스트로 대체한다. */
let fallbackToastShown = false;
function imgFallback(el){
  if(el.dataset.fallbackApplied) return; // 무한 루프 방지
  el.dataset.fallbackApplied = "1";
  const label = el.alt || "이미지 없음";
  const wrap = el.parentElement;
  el.style.display = "none";
  const ph = document.createElement("div");
  ph.className = "img-fallback";
  ph.textContent = label;
  wrap.appendChild(ph);

  if(!fallbackToastShown){
    fallbackToastShown = true;
    toast("이미지를 불러오지 못했습니다. GitHub Pages 배포 상태를 확인해주세요.", 3200);
  }
}

/* #reveal-img, #modal-img는 매번 새로 만들어지는 요소가 아니라
   화면마다 재사용되는 고정 <img> 태그다. 예전에 한 번이라도 로드에
   실패해 imgFallback()이 걸리면 el.style.display='none'과
   dataset.fallbackApplied가 영구히 남아, 이후 정상 이미지로 src를
   바꿔도 계속 텍스트 대체 화면만 보이는 문제가 있었다.
   새 카드 이미지를 넣기 전에는 반드시 이 함수로 초기화한 뒤 src를 설정한다. */
function setCardImage(imgEl, url){
  delete imgEl.dataset.fallbackApplied;
  imgEl.style.display = "";
  const wrap = imgEl.parentElement;
  wrap.querySelectorAll(".img-fallback").forEach(ph => ph.remove());
  imgEl.src = url;
}

/* ---------- 4. 배경 별 파티클 생성 ---------- */
(function createStars(){
  const container = document.getElementById("stars");
  const count = 60;
  for(let i=0;i<count;i++){
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*2 + 1;
    s.style.width = size+"px";
    s.style.height = size+"px";
    s.style.left = Math.random()*100+"%";
    s.style.top = Math.random()*100+"%";
    s.style.animationDelay = (Math.random()*3)+"s";
    s.style.animationDuration = (2.4+Math.random()*2.4)+"s";
    container.appendChild(s);
  }
})();

/* ---------- 5. 스파클 파티클 이펙트 (매칭 성공 시) ---------- */
function spawnSparkles(x, y, count=10){
  for(let i=0;i<count;i++){
    const el = document.createElement("div");
    el.className = "spark";
    const angle = Math.random()*Math.PI*2;
    const dist = 40 + Math.random()*50;
    el.style.setProperty("--dx", Math.cos(angle)*dist+"px");
    el.style.setProperty("--dy", Math.sin(angle)*dist+"px");
    el.style.left = x+"px";
    el.style.top = y+"px";
    document.body.appendChild(el);
    setTimeout(()=> el.remove(), 850);
  }
}

/* ---------- 6. 메모리 게임 로직 ---------- */
let boardCards = [];      // 현재 판의 카드 배열 (20장)
let flippedEls = [];      // 현재 뒤집혀 대기 중인 카드 DOM
let attempts = 0;
let matchedCount = 0;
let boardLocked = false;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildBoard(){
  // 10종 x 2장 = 20장 구성 후 셔플
  const pairs = CARD_TYPES.concat(CARD_TYPES); // 각 타입 2장씩
  boardCards = shuffle(pairs);

  attempts = 0; matchedCount = 0; flippedEls = []; boardLocked = false;
  document.getElementById("stat-attempts").textContent = "0";
  document.getElementById("stat-matched").textContent = "0";

  const board = document.getElementById("board");
  board.innerHTML = "";

  boardCards.forEach((card, idx) => {
    const cardEl = document.createElement("div");
    cardEl.className = "card";
    cardEl.dataset.typeId = card.id;
    cardEl.dataset.uid = idx;
    cardEl.innerHTML =
      '<div class="card-inner">' +
        '<div class="card-face card-back"><img src="'+CARD_BACK_URL+'" alt="뒷면" onerror="imgFallback(this)"></div>' +
        '<div class="card-face card-front"><img src="'+card.img+'" alt="'+card.name+'" onerror="imgFallback(this)"></div>' +
      '</div>';
    cardEl.addEventListener("click", onCardClick);
    board.appendChild(cardEl);

    // 카드 등장 애니메이션: 0.05초 간격 순차 등장
    setTimeout(()=> cardEl.classList.add("dealt"), 40 + idx*50);
  });
}

function onCardClick(e){
  const cardEl = e.currentTarget;
  if(boardLocked) return;
  if(cardEl.classList.contains("flipped") || cardEl.classList.contains("matched")) return;
  if(flippedEls.length >= 2) return;

  cardEl.classList.add("flipped");
  flippedEls.push(cardEl);

  if(flippedEls.length === 2){
    attempts++;
    document.getElementById("stat-attempts").textContent = attempts;
    boardLocked = true;

    const [a, b] = flippedEls;
    if(a.dataset.typeId === b.dataset.typeId){
      // 매칭 성공 -> 유지 + 반짝임 효과
      setTimeout(()=>{
        a.classList.add("matched");
        b.classList.add("matched");
        [a,b].forEach(el=>{
          const rect = el.getBoundingClientRect();
          spawnSparkles(rect.left+rect.width/2, rect.top+rect.height/2, 8);
        });
        matchedCount++;
        document.getElementById("stat-matched").textContent = matchedCount;
        flippedEls = [];
        boardLocked = false;
        if(matchedCount === 10){
          setTimeout(onBoardCleared, 500);
        }
      }, 260);
    }else{
      // 틀리면 1초 후 다시 뒤집힘
      setTimeout(()=>{
        a.classList.remove("flipped");
        b.classList.remove("flipped");
        flippedEls = [];
        boardLocked = false;
      }, 1000);
    }
  }
}

/* ---------- 7. 클리어 -> 카드팩 흐름 ---------- */
function onBoardCleared(){
  showScreen("screen-clear");
  setTimeout(()=>{
    showScreen("screen-pack");
    resetPackVisual();
  }, 2600);
}

function resetPackVisual(){
  const pack = document.getElementById("pack-wrap");
  pack.style.pointerEvents = "auto";
  const packCardEl = document.querySelector(".pack-card");
  packCardEl.style.transform = "";
  packCardEl.style.webkitTransform = "";
}

document.getElementById("pack-wrap").addEventListener("click", onPackTap);

function onPackTap(){
  const pack = document.getElementById("pack-wrap");
  pack.style.pointerEvents = "none"; // 중복 터치 방지

  const burst = document.getElementById("pack-burst");
  burst.classList.remove("active");
  void burst.offsetWidth; // 리플레이 트릭
  burst.classList.add("active");

  const packCardEl = document.querySelector(".pack-card");
  packCardEl.style.transition = "transform .5s ease";
  packCardEl.style.transform = "rotateY(360deg) scale(1.08)";
  packCardEl.style.webkitTransform = "rotateY(360deg) scale(1.08)"; // Safari 호환

  setTimeout(revealDrawnCard, 550);
}

/* ---------- 8. 랜덤 카드 뽑기 (가챠 확률) ---------- */
function pickRarity(){
  const r = Math.random()*100;
  let acc = 0;
  for(const tier of RARITY_WEIGHTS){
    acc += tier.weight;
    if(r <= acc) return tier.id;
  }
  return RARITY_WEIGHTS[RARITY_WEIGHTS.length-1].id;
}

function drawRandomCard(){
  const rarityId = pickRarity();
  const pool = CARD_TYPES.filter(c => c.rarity === rarityId);
  return pool[Math.floor(Math.random()*pool.length)];
}

let lastDrawnCard = null;

function revealDrawnCard(){
  const card = drawRandomCard();
  lastDrawnCard = card;

  const isNew = !collection[card.id];
  collection[card.id] = collection[card.id] || { count: 0 };
  collection[card.id].count++;
  saveCollection(collection);

  const rarityInfo = RARITY[card.rarity];
  const rarityTagEl = document.getElementById("reveal-rarity");
  rarityTagEl.textContent = rarityInfo.label;
  rarityTagEl.style.background = rarityInfo.color;
  rarityTagEl.style.color = "#0b0b2e";

  setCardImage(document.getElementById("reveal-img"), card.img);
  document.getElementById("reveal-name").textContent = card.name;

  const tagEl = document.getElementById("reveal-tag");
  tagEl.textContent = isNew ? "NEW" : "DUPLICATE";
  tagEl.className = "new-dup-tag " + (isNew ? "is-new" : "is-dup");

  showScreen("screen-reveal");

  const totalOwned = Object.keys(collection).length;
  if(totalOwned === CARD_TYPES.length){
    setTimeout(()=> toast("🎉 컬렉션 10/10 완성! Complete Collection!"), 500);
  }
}

/* ---------- 9. 카드 저장(다운로드) ---------- */
async function downloadCardImage(url, filename){
  try{
    const res = await fetch(url, { mode:"cors" });
    if(!res.ok) throw new Error("fetch failed");
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=> URL.revokeObjectURL(blobUrl), 4000);
    toast("이미지가 저장되었습니다.");
  }catch(err){
    // CORS 등으로 직접 다운로드가 막히는 경우, 새 탭으로 열어 길게 눌러 저장하도록 안내
    window.open(url, "_blank");
    toast("새 창에서 이미지를 길게 눌러 저장해주세요.");
  }
}

document.getElementById("btn-save-card").addEventListener("click", ()=>{
  if(!lastDrawnCard) return;
  downloadCardImage(lastDrawnCard.img, lastDrawnCard.file);
});

/* ---------- 10. 버튼 이벤트 ---------- */
document.getElementById("btn-view-collection").addEventListener("click", ()=>{
  renderCollection();
  showScreen("screen-collection");
});
document.getElementById("btn-goto-collection").addEventListener("click", ()=>{
  renderCollection();
  showScreen("screen-collection");
});
document.getElementById("btn-collection-back").addEventListener("click", ()=>{
  showScreen("screen-start");
});
document.getElementById("btn-retry").addEventListener("click", ()=>{
  showScreen("screen-game");
  buildBoard();
});

// 시작화면 터치 -> 게임 시작 (버튼/링크 클릭은 제외)
document.getElementById("screen-start").addEventListener("click", (e)=>{
  if(e.target.closest("#btn-goto-collection")) return;
  showScreen("screen-game");
  buildBoard();
});

/* ---------- 11. 컬렉션 화면 렌더링 ---------- */
function renderCollection(){
  const grid = document.getElementById("collection-grid");
  grid.innerHTML = "";
  let ownedCount = 0;

  CARD_TYPES.forEach(card=>{
    const owned = !!collection[card.id];
    if(owned) ownedCount++;

    const item = document.createElement("div");
    item.className = "coll-item" + (owned ? "" : " locked");
    item.innerHTML =
      '<img src="'+card.img+'" alt="'+card.name+'" onerror="imgFallback(this)">' +
      (owned ? '<span class="coll-count">x'+collection[card.id].count+'</span>' : '') +
      '<span class="coll-badge">'+ RARITY[card.rarity].label +'</span>';

    if(owned){
      item.addEventListener("click", ()=> openCardModal(card));
    }
    grid.appendChild(item);
  });

  document.getElementById("collection-progress").textContent = ownedCount + "/" + CARD_TYPES.length;
}

/* ---------- 12. 카드 확대 모달 ---------- */
function openCardModal(card){
  setCardImage(document.getElementById("modal-img"), card.img);
  document.getElementById("modal-name").textContent = card.name;
  document.getElementById("modal-card").classList.add("active");
  document.getElementById("modal-save").onclick = ()=> downloadCardImage(card.img, card.file);
}
document.getElementById("modal-close").addEventListener("click", ()=>{
  document.getElementById("modal-card").classList.remove("active");
});
document.getElementById("modal-card").addEventListener("click", (e)=>{
  if(e.target.id === "modal-card") e.currentTarget.classList.remove("active");
});

/* ---------- 초기 진입 ---------- */
showScreen("screen-start");
</script>
